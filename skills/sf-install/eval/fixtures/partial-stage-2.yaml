# Fixture: install was aborted partway through Stage 2 (3 of 6 plugins installed).
# Tests the resume protocol's "pick up at the next pending plugin" behavior.
#
# Consumed by eval.json test "resume-from-partial-stage-2".

fixture_name: partial-stage-2
framework_version: "1.0.0"
simulated_date: "2026-05-29"

environment:
  XDG_STATE_HOME: /tmp/sf-eval-state
  home: /tmp/sf-eval-home
  ANTHROPIC_API_KEY: "sk-ant-eval-1234"
  UPSTASH_CONTEXT7_API_KEY: "upstash-eval-5678"

system_probes:
  claude_version: "1.2.0"
  claude_auth_status: "Logged in as eval@example.com"
  node_version: "22.7.1"
  git_version: "2.43.0"
  gh_version: "2.45.0"
  gh_auth_status: "Logged in to github.com as eval-user"

filesystem:
  - path: $XDG_STATE_HOME/sf/install-state.json
    kind: file
    content:
      schema_version: 1
      framework_version: "1.0.0"
      started_at: "2026-05-28T22:14:00Z"
      last_updated_at: "2026-05-28T22:18:00Z"
      completed_stages: [1]
      stage_artifacts:
        "1":
          env_ok: true
          checks:
            claude_auth: true
            gh_auth: true
            node_version: "22.7.1"
            node_ok: true
            git_ok: true
            anthropic_api_key: true
            upstash_context7_api_key: true
          last_check_at: "2026-05-28T22:15:00Z"
        "2":
          plugins_installed:
            - { name: "context-mode", version: "1.4.0" }
            - { name: "claude-mem", version: "2.1.3" }
            - { name: "superpowers", version: "5.1.0" }
      abort_log:
        - stage: 2
          error_summary: "/plugin install skill-creator failed: network timeout"
          ts: "2026-05-28T22:18:00Z"

simulated_already_installed_plugins:
  - context-mode@1.4.0
  - claude-mem@2.1.3
  - superpowers@5.1.0

simulated_plugin_registry:
  # Same as fresh-machine fixture
  schema_version: 1
  framework_version: "1.0.0"
  plugins:
    context-mode:         { version: "1.4.0", marketplace: "mksglu/context-mode", id: "context-mode@context-mode" }
    claude-mem:           { version: "2.1.3", marketplace: "thedotmack/claude-mem", id: "claude-mem" }
    superpowers:          { version: "5.1.0", marketplace: "claude-plugins-official", id: "superpowers@claude-plugins-official" }
    skill-creator:        { version: "1.0.5", marketplace: "anthropics/skills", id: "skill-creator@anthropic-agent-skills" }
    context7:             { version: "0.9.2", marketplace: "claude-plugins-official", id: "context7@claude-plugins-official" }
    claude-md-management: { version: "1.0.1", marketplace: "claude-plugins-official", id: "claude-md-management@claude-plugins-official" }

# Stages 3-7 continue normally after Stage 2 finishes
simulated_friend_responses: { inherits: fresh-machine }
simulated_feed: { inherits: fresh-machine }
simulated_doctor_report: { inherits: fresh-machine }

expected_resume_behavior:
  - "Stage 1 re-checks (P1 always-check behavior); all probes pass; no prompt"
  - "Stage 2 detects 3 of 6 plugins installed; resumes at plugin index 4 (skill-creator)"
  - "Stage 2 issues exactly 3 new /plugin install commands: skill-creator, context7, claude-md-management"
  - "Stage 2 does NOT issue /plugin install for context-mode, claude-mem, or superpowers"
  - "Stages 3-7 run to completion"
