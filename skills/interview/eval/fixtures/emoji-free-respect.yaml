# Fixture: friend chooses emoji-free communication style. Skill must respect
# that choice consistently — in identity.md body AND progress messages to the
# friend during the interview.
#
# Consumed by eval.json test "emoji-free-respect".

fixture_name: emoji-free-respect
framework_version: "0.1.0"
simulated_date: "2026-05-29"

environment:
  XDG_STATE_HOME: /tmp/sf-eval-state
  home: /tmp/sf-eval-home

filesystem:
  - path: ~/.startup-framework/wiki/index.md
    kind: file
  - path: ~/.startup-framework/wiki/log.md
    kind: file

install_state:
  proposed_handle: null

simulated_friend_responses:
  q1-name-handle:
    name: "Test Friend"
    handle: "test-friend"
  q2-intro: "Builder who prefers plain text."
  q3-role:
    page1: "employed"
  q4-strong-skills:
    stage1: ["build"]
    stage2_build: ["backend"]
  q5-growth-areas:
    stage1: []
  q6-response-length: "terse"
  q7-communication-style:
    sub7a_tone: "casual"
    sub7b_emoji: "no"               # <-- the assertion-driving choice
  q8-plans-before-code: "often"
  q9-hours-tz:
    timezone: ""
    working_hours: ""
  q10-languages:
    stage1: ["data-or-other"]
    stage2_data: ["python"]
  q11-package-managers: "uv"
  q12-clouds:
    page1: []
  q13-databases:
    page1: ["postgresql"]
  q14-other-tools: ""
  q15-tdd: "encouraged"
  q16-avoid-patterns: "Bullet lists with decorative icons."
  q17-phase: "building"
  q18-contribution: "Skeptical reviewer; surfaces over-engineering early."

expected_writes_after_run:
  - ~/.startup-framework/wiki/identity.md

assertion_emphasis:
  - "communication_style frontmatter value contains 'no-emoji' substring"
  - "Markdown body has zero emoji codepoints"
  - "Skill's own user-facing prompts during the interview avoided emoji once Q7 was answered (or earlier, if SKILL.md sets a no-emoji default for the interview itself)"

note: |
  The fourth assertion is intentionally lenient. The skill cannot know the
  friend's emoji preference until Q7 is answered. After Q7, subsequent prompts
  in the same interview should respect the choice. The eval harness checks
  prompt output only from Q8 onward for emoji compliance.
