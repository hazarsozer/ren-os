# wiki-skeleton manifest
# Consumed by /sf:install Stage 5 (master wiki bootstrap) and /sf:bootstrap-project
# (per-project sub-wiki bootstrap). Each entry describes one file or directory
# the loader can stamp into a friend's wiki. The loader NEVER overwrites
# existing files — it diffs additive changes and requires explicit friend approval
# (additive-only migration pattern, per ADR-027 + team-lead pushback on Stage 5).
#
# Schema version 1. Bump when the contract changes (loader interface evolves).

schema_version: 1

# Manifest profiles — different consumers stamp different subsets.
# `master` = /sf:install Stage 5
# `project` = /sf:bootstrap-project <name>
profiles:
  master:
    description: "Files stamped at the master wiki root during /sf:install Stage 5"
    entries:
      - path: "index.md"
        template: "templates/index.md.tmpl"
        type: file
        write_rule: copy_if_missing
        min_framework_version: "1.0.0"
        description: "Master catalog index; empty section headers, frontmatter only"

      - path: "log.md"
        template: "templates/log.md.tmpl"
        type: file
        write_rule: copy_if_missing
        min_framework_version: "1.0.0"
        description: "Master chronological event log; single init entry"

      - path: "identity.md"
        template: "templates/identity.md.tmpl"
        type: file
        write_rule: copy_if_missing
        min_framework_version: "1.0.0"
        description: "Identity frontmatter stub; /sf:interview populates fields"
        # /sf:interview re-runs are responsible for in-place updates; Stage 5
        # only writes this template if no identity.md exists yet.

      - path: "LICENSES.md"
        template: "templates/LICENSES.md.tmpl"
        type: file
        write_rule: copy_if_missing
        generated_at: stage-6
        min_framework_version: "1.0.0"
        description: "Plugin-license summary; written by Stage 6 from the registry"

      - path: "research/"
        type: directory
        write_rule: create_if_missing
        min_framework_version: "1.0.0"

      - path: "decisions/"
        type: directory
        write_rule: create_if_missing
        min_framework_version: "1.0.0"

      - path: "alternatives/"
        type: directory
        write_rule: create_if_missing
        min_framework_version: "1.0.0"

      - path: "patterns/"
        type: directory
        write_rule: create_if_missing
        min_framework_version: "1.0.0"

      - path: "projects/"
        type: directory
        write_rule: create_if_missing
        min_framework_version: "1.0.0"

  project:
    description: "Files stamped into wiki/projects/<project>/ by /sf:bootstrap-project"
    # The per-project taxonomy lives in skills/sf-bootstrap-project/ (per ADR-014).
    # This profile is reserved for future shared per-project files. v1: empty.
    # When sf-bootstrap-project ships, its template set MAY be migrated here so
    # both consumers share a single manifest.
    entries: []

# Per-write_rule semantics (single source of truth for the loader):
#
#   copy_if_missing       Target file: written only if path does not exist.
#                         Existing path is reported as "skipped (already present)".
#   create_if_missing     Target directory: mkdir -p only if path does not exist.
#                         No file content placed; .gitkeep stays in the skeleton tree.
#   never_write           Reserved. Reserved entry; loader records its existence
#                         but never writes. Useful for deprecated paths.
#
# write_rule is the only knob; the loader does NOT support overwrite at any rule level.

# Template variable contract (all profiles share):
#
#   {{handle}}             friend handle (kebab-case)         required for identity.md
#   {{name}}               friend display name                required for identity.md
#   {{today}}              ISO date YYYY-MM-DD                always available
#   {{framework_version}}  framework semver (e.g. "1.0.0")    always available
#
# Missing placeholder values cause the loader to leave the literal {{var}} in
# the file and emit a warning. No silent substitution with empty strings.
